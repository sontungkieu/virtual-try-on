services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      TRYON_API_RUN_MODE: "sync"
    volumes:
      - ../virtual_tryon/models:/app/virtual_tryon/models
      - ../virtual_tryon/data/outputs:/app/virtual_tryon/data/outputs
      - ../virtual_tryon/data/eval_set:/app/virtual_tryon/data/eval_set
      - ../virtual_tryon/third_party:/app/virtual_tryon/third_party

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:8000"
    depends_on:
      - backend
